sample_id: local_video_summary_001
intent: 本地视频总结
input:
  message: "请总结我刚上传的视频内容"
  session_id: "baseline_local_video_summary_001"
  use_knowledge: false
  attachments:
    - type: local_file
      name: "sample_local_video.mp4"
expected_lane_old: "unified_main_chain"
expected_lane_new: "video"
expected_mode_new: "fast"
expected_call_path:
  - "application.chat.run_chat_turn:run_agno_chat_turn_impl"
  - "agents.middle_agent.video_flow:run_early_local_video_flow"
  - "tools.video.extract_local_video_subtitle:_extract_local_video_subtitle"
expected_trace_keys:
  - "request_id"
  - "session_id"
  - "v16_video_source_type"
must_not_regress:
  - response_includes: "视频"
  - first_response_ms_le: 4500
acceptance_after_migration:
  lane: "video"
  mode_either_of: ["fast", "complex"]
  must_call_capability: "capability.video.short_sync_asr"
  must_not_call_capability: "capability.web.static_fetch"
