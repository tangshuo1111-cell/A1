sample_id: video_url_summary_002
intent: 长视频 URL 总结并允许后台化
input:
  message: "帮我总结这个长视频的重点 https://www.youtube.com/watch?v=baseline002"
  session_id: "baseline_video_url_summary_002"
  use_knowledge: false
  attachments: []
expected_lane_old: "unified_main_chain"
expected_lane_new: "video"
expected_mode_new: "complex"
expected_call_path:
  - "application.chat.run_chat_turn:run_agno_chat_turn_impl"
  - "agents.middle_agent.video_flow:run_early_web_video_flow"
  - "services.video_background_pipeline:queue_web_video_asr_task"
expected_trace_keys:
  - "request_id"
  - "session_id"
  - "video_task_id"
must_not_regress:
  - response_includes: "后台"
  - first_response_ms_le: 5000
acceptance_after_migration:
  lane: "video"
  mode_either_of: ["complex", "async"]
  must_call_capability: "capability.video.duration_probe"
  must_not_call_capability: "capability.kb.retrieve"
