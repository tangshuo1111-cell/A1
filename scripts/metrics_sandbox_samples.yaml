  # 全 API 链路：upload prepare → commit → use_knowledge 检索（不依赖 seed，独立 session）
  - id: reuse_flow_01
    tag: reuse
    flow: commit_then_retrieve
    asset_file: scripts/metrics_sandbox_assets/flow_phoenix_brief.md
