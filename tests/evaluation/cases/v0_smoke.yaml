- case_id: general_simple_explain
  case_name: 普通简单解释类问题
  category: general
  user_input: "RAG 是什么？"
  attachments: []
  session_setup: {}
  expected:
    allowed_lanes: ["general"]
    expected_mode: fast
    allowed_task_status:
      - succeeded
      - partial
    expected_pending_kind: null
    expected_primary_path: general_fast
    required_trace_fields:
      - task_status
      - primary_path
  judge:
    rule: true
    llm_judge: false
    human_review: false
  must_not_happen_rule_ids:
    - C_UNCLASSIFIED_WARNING
  must_not_happen:
    - "不能无依据升级成 video/document/web lane"

- case_id: general_complex_compare
  case_name: 普通复杂比较问题
  category: general
  user_input: "比较 RAG 和普通搜索的优缺点，并给我推荐。"
  attachments: []
  session_setup: {}
  expected:
    allowed_lanes: ["general", "kb", "web"]
    allowed_modes:
      - complex
      - fast
    allowed_task_status:
      - succeeded
      - partial
      - pending
    allowed_primary_paths:
      - complex
      - general_fast
    required_trace_fields:
      - task_status
      - primary_path
  judge:
    rule: true
    llm_judge: false
    human_review: false
  must_not_happen_rule_ids:
    - C_UNCLASSIFIED_WARNING
  must_not_happen:
    - "不能把复杂比较题伪装成已完成的空泛快答"

- case_id: web_static_page
  case_name: 静态网页场景结构样例
  category: web
  user_input: "请总结这个网页：https://example.com/static"
  attachments: []
  session_setup: {}
  expected:
    allowed_lanes: ["web", "general"]
    allowed_modes:
      - fast
      - async
      - complex
    allowed_task_status:
      - succeeded
      - pending
      - partial
    allowed_primary_paths:
      - web_fast
      - web_async
      - complex
    required_trace_fields:
      - task_status
      - primary_path
  judge:
    rule: true
    llm_judge: false
    human_review: false
  must_not_happen_rule_ids:
    - B_NO_WEB_CLAIM_WITHOUT_EVIDENCE
  must_not_happen:
    - "不能在没有网页正文时假装完整读取网页"

- case_id: document_txt
  case_name: 文本文件解析结构样例
  category: document
  user_input: "帮我解析这个 txt 文件"
  attachments:
    - name: sample.txt
      kind: local_fixture
  session_setup: {}
  expected:
    allowed_lanes: ["document", "general"]
    allowed_modes:
      - fast
      - complex
    allowed_task_status:
      - succeeded
      - partial
    expected_pending_kind: null
    allowed_primary_paths:
      - document_fast
      - complex
  judge:
    rule: true
    llm_judge: false
    human_review: false
  must_not_happen_rule_ids:
    - C_ROUTE_QUALITY
  must_not_happen:
