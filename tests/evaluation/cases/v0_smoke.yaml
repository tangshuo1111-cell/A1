- case_id: document_scanned_pdf_ocr_required
  case_name: 扫描 PDF 触发 OCR 结构样例
  category: document
  user_input: "帮我解析这个扫描版 PDF"
  attachments:
    - name: scanned_pdf.pdf
      kind: local_fixture
  session_setup: {}
  expected:
    allowed_lanes: ["document", "general"]
    allowed_modes:
      - async
      - complex
    allowed_task_status:
      - pending
      - partial
      - blocked
    allowed_pending_kinds:
      - fast_pending
      - processing_pending
      - null
    allowed_primary_paths:
      - document_async
      - complex
    expected_material_flags:
      document_ocr_required: true
  judge:
    rule: true
    llm_judge: false
    human_review: false
  must_not_happen_rule_ids:
    - A_NO_FAKE_DOC_PARSE
  must_not_happen:
    - "不能在 OCR 未完成时生成扫描 PDF 摘要"

