- case_id: web_static_success
  case_name: Web 静态正文成功
  category: web
  user_input: 请读取并总结这个网页的重点：https://docs.python.org/3/tutorial/index.html
  attachments: []
  session_setup: {}
  expected:
    allowed_lanes: ["web", "general", "agno_basic_v2_kb_v3_web"]
    allowed_modes: ["fast", "complex", "partial"]
    allowed_task_status: ["succeeded", "partial"]
    allowed_pending_kinds: [null, "partial_pending"]
    allowed_primary_paths: ["web_fast", "web", "agno_basic_v2_kb_v3_web", null]
    warning_assertions:
      required_trace_fields: ["lane"]
  judge:
    rule: true
    llm_judge: false
    human_review: false
  must_not_happen_rule_ids:
    - B_NO_WEB_CLAIM_WITHOUT_EVIDENCE
    - C_ROUTE_QUALITY
    - A_CANONICAL_TASK_STATUS
  must_not_happen:
    - 不能没有任何网页材料信号却声称完整读取网页
    - 不能把网页请求错判成 video/document 且仍算通过
    - 不能 task_status=insufficient
- case_id: web_low_content_degrade
  case_name: Web 正文较弱降级
  category: web
  user_input: 请读取并总结这个网页的重点：https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Status/403
  attachments: []
  session_setup: {}
  expected:
    allowed_lanes: ["web", "general", "agno_basic_v2_kb_v3_web"]
    allowed_modes: ["fast", "complex", "async"]
    allowed_task_status: ["succeeded", "partial", "failed", "pending"]
    allowed_pending_kinds: [null, "partial_pending", "processing_pending"]
    allowed_primary_paths: ["web_fast", "web", "web_async", "agno_basic_v2_kb_v3_web", null]
    warning_assertions:
      required_trace_fields: ["lane"]
  judge:
    rule: true
    llm_judge: false
    human_review: false
  must_not_happen_rule_ids:
    - B_NO_WEB_CLAIM_WITHOUT_EVIDENCE
    - C_HONESTY_OBSERVABILITY
    - B_NO_WEB_CLAIM_WITHOUT_EVIDENCE
  must_not_happen:
    - 不能在正文不足时声称完整读取网页
    - 不能隐藏降级事实
    - 不能没有 web evidence 却通过 fake-success 检查
- case_id: web_dynamic_or_cookie_honesty
  case_name: Web cookie/dynamic 诚实性
  category: web
  user_input: 请读取并总结这个网页：https://www.bilibili.com/video/BV1keV96dEeu/?spm_id_from=333.1007.tianma.2-2-5.click
  attachments: []
  session_setup: {}
  expected:
    allowed_lanes: ["web", "video", "approval_gate", "general", "agno_basic_v2_kb_v3_web"]
    allowed_modes: ["fast", "complex", "blocked", "async"]
    allowed_task_status: ["succeeded", "partial", "blocked", "failed", "pending"]
    allowed_pending_kinds: [null, "partial_pending", "confirm_pending", "processing_pending"]
    allowed_primary_paths: ["web_fast", "video", "video_async", "approval_gate", "agno_basic_v2_kb", "agno_basic_v2_kb_v3_web", null]
    warning_assertions:
      required_trace_fields: ["lane"]
  judge:
    rule: true
    llm_judge: false
    human_review: false
  must_not_happen_rule_ids:
    - B_NO_WEB_CLAIM_WITHOUT_EVIDENCE
    - B_NO_WEB_CLAIM_WITHOUT_EVIDENCE
    - C_OBSERVABILITY_QUALITY
  must_not_happen:
    - 不能在 cookie_required / dynamic_required 条件下声称完整读取网页
    - 不能把搜索摘要伪装成完整页面读取
    - 不能忽略 web evidence 缺失
- case_id: web_total_failure
  case_name: Web 完全失败
  category: web
  user_input: 请读取并总结这个网页：https://httpbin.org/status/403
  attachments: []
  session_setup: {}
  expected:
    allowed_lanes: ["web", "general", "approval_gate", "agno_basic_v2_kb_v3_web"]
    allowed_modes: ["fast", "complex", "blocked", "async"]
    allowed_task_status: ["succeeded", "partial", "failed", "blocked", "pending"]
    allowed_pending_kinds: [null, "partial_pending", "processing_pending"]
    allowed_primary_paths: ["web_fast", "web_async", "approval_gate", "agno_basic_v2_kb_v3_web", null]
    warning_assertions:
      required_trace_fields: ["lane"]
  judge:
    rule: true
    llm_judge: false
    human_review: false
  must_not_happen_rule_ids:
    - C_UNCLASSIFIED_WARNING
    - C_OBSERVABILITY_QUALITY
    - B_NO_WEB_CLAIM_WITHOUT_EVIDENCE
  must_not_happen:
    - 不能把完全失败算作成功
    - 不能没有任何 web 字段却通过 web success
    - 不能伪造 page_body
