- case_id: ocr_required_honesty
  case_name: OCR required 诚实性
  category: route_exit_state
  user_input: 我有一份扫描版 PDF，先按扫描 PDF 场景告诉我接下来会怎么处理。
  expected:
    allowed_lanes: ["document", "general", "agno_basic_v2_kb_v3_web"]
    allowed_modes: ["async", "complex", "fast"]
    allowed_task_status: ["pending", "blocked", "partial", "failed"]
    allowed_pending_kinds: [null, "processing_pending", "material_pending", "fast_pending", "partial_pending"]
    allowed_primary_paths: ["document", "document_complex", "agno_basic", "agno_basic_v2_kb_v3_web", null]
    required_trace_fields: ["lane"]
  judge:
    rule: true
    llm_judge: false
    human_review: false
  must_not_happen_rule_ids:
    - A_NO_FAKE_DOC_PARSE
  must_not_happen:
    - 不能在 OCR 未完成时生成扫描 PDF 摘要
