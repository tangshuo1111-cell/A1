- case_id: complex_kb_project_explain
  case_name: complex KB 项目讲解
  category: complex_kb
  user_input: 请根据知识库，帮我讲清楚这个项目的主链路、核心模块和面试时最应该强调的技术亮点。
  session_setup:
    session_id: eval_v3_complex_kb_project_explain
    use_knowledge: true
  expected:
    hard_assertions:
      allowed_task_status: ["succeeded", "partial", "failed", "blocked"]
      allowed_pending_kinds: [null, "partial_pending", "processing_pending"]
      allowed_primary_paths: ["kb", "kb_fast", "kb_complex", "agno_basic", "agno_basic_v2_kb", "agno_basic_v2_kb_v3_web", "general_complex", "direct_llm", null]
      allowed_modes: ["fast", "complex", "async"]
      allowed_lanes: ["kb", "general", "approval_gate", "agno_basic_v2_kb_v3_web"]
      must_have_one_of: ["primary_path", "quality_gate", "material_sufficiency", "v6_main_pan_renwu"]
      required_trace_fields: ["primary_path"]
    soft_observability:
      try_extract:
        - routing_explain
        - router_source
        - kb_hits
        - kb_evidence_tier
        - quality_gate.reason_codes
        - v6_main_pan_renwu
        - v6_middle_pan_laiyuan
    expected_plan_behavior: kb_or_project_context_observable
    expected_material_behavior: kb_material_or_honest_insufficiency
    expected_answer_behavior: grounded_or_honestly_limited
    expected_quality_gate_behavior: honor_material_insufficiency
    expected_evidence_behavior: no_false_claim_of_strong_kb_evidence
    expected_grounding_behavior: answer_should_not_claim_full_project_truth_without_material
  judge:
    rule: true
    llm_judge: false
    human_review: false
  must_not_happen_rule_ids:
    - B_NO_KB_CLAIM_WITHOUT_EVIDENCE
    - C_UNCLASSIFIED_WARNING
    - C_ROUTE_QUALITY
    - A_CANONICAL_TASK_STATUS
  must_not_happen:
    - 不能无 KB 命中却声称根据知识库明确得出
    - 不能没有材料证据却输出项目真实主链路完整如下
    - 不能把复杂讲解题当普通 direct_llm 且无 warning
    - 不能 task_status=insufficient

