- case_id: complex_document_reasoning
  case_name: complex 文档推理
  category: complex_document
  user_input: 请基于下面这段文档内容，判断它适合放进项目面试讲解的哪一部分，并说明取舍：本项目评测体系分为 route、exit state、capability chain、multi-turn state 和 agent collaboration 五层。
  session_setup:
    session_id: eval_v3_complex_document_reasoning
    use_knowledge: false
  expected:
    hard_assertions:
      allowed_task_status: ["succeeded", "partial", "failed", "blocked"]
      allowed_pending_kinds: [null, "material_pending", "partial_pending"]
      allowed_primary_paths: ["document", "document_fast", "document_complex", "general_complex", "agno_basic", "direct_llm", null]
      allowed_modes: ["fast", "complex", "blocked"]
      allowed_lanes: ["document", "general", "approval_gate"]
      must_have_one_of: ["primary_path", "material_sufficiency", "quality_gate", "answer"]
    soft_observability:
      try_extract:
        - v6_main_pan_renwu
        - v6_middle_pan_laiyuan
        - quality_gate.reason_codes
        - temporary_materials
    expected_plan_behavior: document_reasoning_or_inline_material_observable
    expected_material_behavior: inline_material_should_be_respected
    expected_answer_behavior: answer_should_use_given_text
    expected_quality_gate_behavior: no_fake_attachment_claim
    expected_evidence_behavior: no_fake_uploaded_document_claim
    expected_grounding_behavior: do_not_drift_away_from_inline_document
  judge:
    rule: true
    llm_judge: false
    human_review: false
  must_not_happen_rule_ids:
    - C_UNCLASSIFIED_WARNING
    - C_CONTENT_SCOPE
    - C_ROUTE_QUALITY
  must_not_happen:
    - 不能声称读取了上传文档但实际没有附件
    - 不能完全脱离给定文本泛泛讲项目
    - 不能把文档复杂分析错判成 video

