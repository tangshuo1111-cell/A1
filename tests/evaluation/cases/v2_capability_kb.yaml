- case_id: kb_complex_insufficient_honesty
  case_name: KB 复杂题证据不足诚实性
  category: kb
  user_input: 根据知识库，这个项目面试时最该强调什么？
  attachments: []
  session_setup:
    use_knowledge: true
  expected:
    allowed_lanes: ["kb", "general", "agno_basic_v2_kb", "agno_basic_v2_kb_v3_web"]
    allowed_modes: ["fast", "complex"]
    allowed_task_status: ["succeeded", "partial", "failed"]
    allowed_pending_kinds: [null, "partial_pending"]
    allowed_primary_paths: ["kb", "kb_fast", "agno_basic_v2_kb", "agno_basic_v2_kb_v3_web", null]
    required_trace_fields: ["lane"]
  judge:
    rule: true
    llm_judge: false
    human_review: false
  must_not_happen_rule_ids:
    - B_NO_KB_CLAIM_WITHOUT_EVIDENCE
    - C_UNCLASSIFIED_WARNING
    - C_HONESTY_OBSERVABILITY
  must_not_happen:
    - 不能在证据不足时声称结论完全来自知识库
    - 不能把 usable/weak 证据当作复杂题充分证据
    - 不能隐藏 kb_insufficient
- case_id: kb_retrieval_fallback_observability
  case_name: KB 检索策略可观测性
  category: kb
  user_input: 根据知识库说明检索策略会不会走 hybrid、semantic 或 keyword。
  attachments: []
  session_setup:
    use_knowledge: true
  expected:
    allowed_lanes: ["kb", "general", "agno_basic_v2_kb", "agno_basic_v2_kb_v3_web"]
    allowed_modes: ["fast", "complex"]
    allowed_task_status: ["succeeded", "partial", "failed"]
    allowed_pending_kinds: [null, "partial_pending"]
    allowed_primary_paths: ["kb", "kb_fast", "agno_basic_v2_kb", "agno_basic_v2_kb_v3_web", null]
    required_trace_fields: ["lane"]
  judge:
    rule: true
    llm_judge: false
    human_review: false
  must_not_happen_rule_ids:
    - C_UNCLASSIFIED_WARNING
    - C_OBSERVABILITY_QUALITY
    - B_NO_KB_CLAIM_WITHOUT_EVIDENCE
  must_not_happen:
