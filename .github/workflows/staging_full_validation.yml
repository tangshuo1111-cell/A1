name: Staging Full Validation

# Scheduled + manual staging bundle (NOT default push CI).
# Runs regression_all + real_external_smoke with real LLM / external deps.
# Requires repository secrets (LLM_API_KEY, etc.) — same as real_external.yml.

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      include_metrics:
        description: "Also run metrics sandbox line (needs metrics PG secrets / self-hosted runner)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: staging-full-validation
  cancel-in-progress: false

jobs:
  full-staging:
    runs-on: ubuntu-latest
    env:
      LIGHT_MAQA_FAKE_LLM: "0"
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      V16_TENCENT_SECRET_ID: ${{ secrets.V16_TENCENT_SECRET_ID }}
      V16_TENCENT_SECRET_KEY: ${{ secrets.V16_TENCENT_SECRET_KEY }}
      V16_ASR_API_KEY: ${{ secrets.V16_ASR_API_KEY }}
      V16_WEB_SEARCH_API_KEY: ${{ secrets.V16_WEB_SEARCH_API_KEY }}
      PYTHONPATH: backend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock

      - name: Run full-staging bundle (regression + real external)
        run: |
          python scripts/evaluation/run_project_validation.py --profile full-staging --execute

      # Honest no-op: the metrics sandbox line is NOT executed in CI (needs an
      # isolated metrics PG + real LLM). This step only prints how to run it
      # locally so the workflow never implies metrics were collected here.
      - name: Metrics sandbox line (NOT run in CI — local only)
        if: github.event.inputs.include_metrics == 'true'
        run: |
          echo "::notice title=metrics-sandbox-skipped::Metrics sandbox is NOT run in CI."
          echo "Run locally with isolated PG + real LLM: scripts/run_metrics_sandbox.ps1"
