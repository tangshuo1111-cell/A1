name: CI

# Default CI = lightweight security + unit/integration guards.
# Does NOT run regression_all (42 E2E cases) or the 7-capability external smoke suite.
# Real staging validation: manual workflow_dispatch (real_external.yml) or local:
#   py scripts/evaluation/run_project_validation.py --profile full-staging --execute

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks (aligned with pre-commit v8.30.1)
        shell: bash
        env:
          GITLEAKS_VERSION: v8.30.1
        run: |
          set -euo pipefail
          ver="${GITLEAKS_VERSION#v}"
          curl -fsSL -o "/tmp/gitleaks_${ver}.tar.gz" \
            "https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VERSION}/gitleaks_${ver}_linux_x64.tar.gz"
          tar -xzf "/tmp/gitleaks_${ver}.tar.gz" -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Gitleaks detect (matches local hook / repo-root .gitleaks.toml)
        run: gitleaks detect --source . --verbose --redact --no-banner

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: light_maqa
          POSTGRES_PASSWORD: light_maqa_dev
          POSTGRES_DB: light_maqa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U light_maqa -d light_maqa"
          --health-interval 4s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 10s
    env:
      LIGHT_MAQA_FAKE_LLM: "1"
      PLAYWRIGHT_BROWSERS_PATH: "0"
      DATABASE_URL: postgresql://light_maqa:light_maqa_dev@localhost:5432/light_maqa
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.lock

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install pytest-cov mypy
          python -m playwright install --with-deps chromium

      - name: Ruff lint
        run: python -m ruff check . --select E,F,I,W,BLE,B,UP,SIM --ignore E501

      - name: Ruff format (governance scripts)
        run: python -m ruff format --check scripts/check_*.py

      - name: Architecture guards (frozen modules + boundaries + field owners)
        run: |
          python scripts/check_frozen_chat_modules.py
          python scripts/check_import_boundaries.py
          python scripts/check_forbidden_legacy_imports.py
          python scripts/check_module_size.py
          python scripts/check_compat_field_writes.py
          python scripts/check_field_owner_writes.py
          python scripts/check_compat_shims.py
          python scripts/check_direct_getenv.py
          python scripts/strip_stale_terms.py
          python scripts/check_legacy_entry_imports.py
          python scripts/check_readme_paths.py
          python scripts/check_history_context_imports.py
          python scripts/check_pending_store_imports.py
          python scripts/check_compat_consumption.py
          python scripts/check_no_pipeline_facade.py
          python scripts/check_fast_lane_boundaries.py
          python scripts/audit_test_patch_depth.py
          python scripts/audit_migration_ledgers.py
          python scripts/check_non_chat_module_size.py
          python scripts/check_observability_health.py
          python scripts/audit_legacy_entry_symbols.py
          python scripts/check_test_db_isolation.py
          python scripts/check_evidence_freshness.py
          python scripts/check_eval_observability_fields.py
          python scripts/check_safe_rule_surface.py

      - name: Mypy (core/config/storage)
        run: python -m mypy

      - name: pip-audit requirements.lock (informational — 不阻断合并；CVE 需人工评估后升级依赖)
        continue-on-error: true
        run: |
          python -m pip install pip-audit
          python -m pip_audit -r requirements.lock || echo "pip-audit: vulnerabilities listed above (informational)"

      - name: Pytest with coverage (--cov-fail-under=60)
        run: |
          python -m pytest tests/smoke/ tests/integration/ tests/backend/ tests/unit/ tests/acceptance/ tests/migration/ tests/baselines/ tests/evaluation/ \
            -q -m "not real_external" \
            --cov=backend --cov-fail-under=60 \
            --cov-report=xml --cov-report=term-missing:skip-covered

      - name: OpenAPI snapshot matches committed docs/current/openapi.json
        env:
          LIGHT_MAQA_FAKE_LLM: "1"
          PLAYWRIGHT_BROWSERS_PATH: "0"
          DATABASE_URL: postgresql://light_maqa:light_maqa_dev@localhost:5432/light_maqa
        run: |
          python scripts/export_openapi.py /tmp/openapi-ci.json
          python scripts/check_openapi_parity.py docs/current/openapi.json /tmp/openapi-ci.json

      - name: Upload coverage.xml
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml
          if-no-files-found: warn

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci + lint + unit tests + build + e2e
        run: |
          npm ci
          npm run lint
          npm run test
          npm run build
          npx playwright install chromium
          npm run test:e2e

      - name: npm audit (--audit-level=high, informational — 不 npm audit fix)
        continue-on-error: true
        run: npm audit --audit-level=high
