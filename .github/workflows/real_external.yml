name: Real External Validation

# Manual-only staging validation (secrets required). NOT part of default push CI.
# For bundled regression + external on a running backend, prefer local:
#   py scripts/evaluation/run_project_validation.py --profile full-staging --execute

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "验收范围 (all / llm / ocr / asr / search)"
        required: false
        default: "all"

concurrency:
  group: real-external
  cancel-in-progress: false

jobs:
  real-external:
    runs-on: ubuntu-latest
    env:
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      V16_TENCENT_SECRET_ID: ${{ secrets.V16_TENCENT_SECRET_ID }}
      V16_TENCENT_SECRET_KEY: ${{ secrets.V16_TENCENT_SECRET_KEY }}
      V16_ASR_API_KEY: ${{ secrets.V16_ASR_API_KEY }}
      V16_WEB_SEARCH_API_KEY: ${{ secrets.V16_WEB_SEARCH_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock

      - name: Run real external tests
        run: |
          python -m pytest tests/ -m "real_external" -q --tb=short -k "${{ github.event.inputs.scope == 'all' && '' || github.event.inputs.scope }}"
